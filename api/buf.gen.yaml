version: v2
plugins:
  - local: protoc-gen-go-grpc
    out: ./
    opt: paths=source_relative
  - local: protoc-gen-go
    out: ./
    opt: paths=source_relative
  - remote: buf.build/protocolbuffers/java
    out: ../integrations/api/src/main/java
  - remote: buf.build/grpc/java
    out: ../integrations/api/src/main/java