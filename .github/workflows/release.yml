name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  update-release:
    name: Update GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build install.yaml
        run: make build-installer

      - name: Build network integrations
        run: make network-build

      - name: Upload release assets
        run: |
          gh release upload ${{ github.ref_name }} \
            dist/install.yaml \
            integrations/velocity/build/libs/velocity-*-all.jar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish controller image
        run: make controller-docker-buildx

      - name: Publish edge image
        run: make edge-docker-buildx

      - name: Publish network images
        run: make network-docker-buildx

  publish-api:
    name: Publish Java API to Maven Central
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Publish to Maven Central
        run: make network-publish
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_KEY: ${{ secrets.GPG_KEY }}
          GPG_KEY_PASSWORD: ${{ secrets.GPG_KEY_PASSWORD }}