apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  labels:
    app.kubernetes.io/name: minecraft-gateway
    app.kubernetes.io/managed-by: kustomize
  name: minefleet-gateway-sample
spec:
  gatewayClassName: minefleet-gatewayclass-sample
  infrastructure:
    parametersRef:
      group: gateway.networking.minefleet.dev
      kind: NetworkInfrastructure
      name: infrastructure-sample
  listeners:
    - name: "minecraft"
      port: 25565
      protocol: TCP
      allowedRoutes:
        kinds:
          - kind: MinecraftFallbackRoute
            group: gateway.networking.minefleet.dev
          - kind: MinecraftJoinRoute
            group: gateway.networking.minefleet.dev
        namespaces:
          from: Same