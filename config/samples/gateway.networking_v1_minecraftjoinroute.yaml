apiVersion: gateway.networking.minefleet.dev/v1
kind: MinecraftJoinRoute
metadata:
  labels:
    app.kubernetes.io/name: minecraft-gateway
    app.kubernetes.io/managed-by: kustomize
  name: minecraftjoinroute-sample
spec:
  priority: 0
  parentRefs:
    - name: minefleet-gateway-sample
      kind: Gateway
      group: gateway.networking.k8s.io
  backendRefs:
    - name: minecraft-service-sample
      port: 25565
  filterRules:
    - type: any
      rules:
        - domain: test.localhost