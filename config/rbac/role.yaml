---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - gateway.minefleet.dev
  resources:
  - minecraftroutes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gateway.minefleet.dev
  resources:
  - minecraftroutes/finalizers
  verbs:
  - update
- apiGroups:
  - gateway.minefleet.dev
  resources:
  - minecraftroutes/status
  verbs:
  - get
  - patch
  - update
