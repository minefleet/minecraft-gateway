# This rule is not used by the project minecraft-gateway itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to gateway.networking.minefleet.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: minecraft-gateway
    app.kubernetes.io/managed-by: kustomize
  name: minecraftproxyconfig-viewer-role
rules:
- apiGroups:
  - gateway.networking.minefleet.dev
  resources:
  - minecraftproxyconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.minefleet.dev
  resources:
  - minecraftproxyconfigs/status
  verbs:
  - get
