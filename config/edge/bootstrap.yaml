apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-bootstrap
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: minecraft-edge
    app.kubernetes.io/managed-by: kustomize
data:
  bootstrap.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901

    node:
      id: minefleet-edge
      cluster: minefleet-gateway

    dynamic_resources:
      ads_config:
        api_type: GRPC
        transport_api_version: V3
        grpc_services:
          - envoy_grpc:
              cluster_name: xds_cluster
      cds_config:
        resource_api_version: V3
        ads: {}
      lds_config:
        resource_api_version: V3
        ads: {}

    static_resources:
      clusters:
        - name: xds_cluster
          type: STRICT_DNS
          connect_timeout: 5s
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: xds_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: minecraft-gateway-edge-xds.minecraft-gateway-system.svc.cluster.local
                          port_value: 18000